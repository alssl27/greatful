<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redirecting…</title>
    <!-- Redirect missing pages to the site root (useful for SPA & Pages fallbacks) -->
    <meta http-equiv="refresh" content="0;url=/greatful/" />
    <script>
      // Fallback JS redirect for clients that ignore meta refresh
      (function(){
        var target = '/greatful/';
        try{ window.location.replace(target); }catch(e){ window.location.href = target; }
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to the site… If your browser does not redirect, <a href="/greatful/">click here</a>.</p>
  </body>
</html>
